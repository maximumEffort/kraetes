<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1a2e"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="120" r="420" fill="#0f3460" opacity="0.35"/>
  <circle cx="1050" cy="580" r="220" fill="#0f3460" opacity="0.2"/>
  <circle cx="80"  cy="580" r="180" fill="#e94560" opacity="0.06"/>

  <!-- Accent bar -->
  <rect x="80" y="310" width="72" height="5" rx="2.5" fill="#e94560"/>

  <!-- Logo / brand name -->
  <text
    x="80" y="200"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="72" font-weight="700" letter-spacing="-1"
    fill="white"
  >Kraetes<tspan fill="#e94560">.</tspan></text>

  <!-- Tagline -->
  <text
    x="80" y="268"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="26" font-weight="400"
    fill="#e94560"
  >Digital Transformation &amp; AI Automation</text>

  <!-- Description line 1 -->
  <text
    x="80" y="360"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="22" font-weight="400"
    fill="rgba(255,255,255,0.72)"
  >Helping enterprises modernize, automate, and grow</text>

  <!-- Description line 2 -->
  <text
    x="80" y="396"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="22" font-weight="400"
    fill="rgba(255,255,255,0.72)"
  >through strategic AI and Oracle Fusion expertise.</text>

  <!-- Trust pills -->
  <rect x="80"  y="450" width="194" height="40" rx="20" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="177" y="476" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="rgba(255,255,255,0.8)">12+ Years Experience</text>

  <rect x="290" y="450" width="174" height="40" rx="20" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="377" y="476" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="rgba(255,255,255,0.8)">20+ Enterprise Clients</text>

  <rect x="480" y="450" width="134" height="40" rx="20" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="547" y="476" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="rgba(255,255,255,0.8)">8 Countries</text>

  <!-- Bottom bar -->
  <rect y="560" width="1200" height="70" fill="rgba(15,52,96,0.5)"/>
  <text
    x="80" y="603"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="18" font-weight="400"
    fill="rgba(255,255,255,0.5)"
  >Amr Sarhan  ·  Dubai, UAE  ·  kraetes.com</text>

  <!-- Oracle certified badge area -->
  <rect x="960" y="450" width="160" height="40" rx="20" fill="rgba(233,69,96,0.15)" stroke="rgba(233,69,96,0.4)" stroke-width="1"/>
  <text x="1040" y="476" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#e94560">Oracle Certified</text>
</svg>
